server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # ── Static assets — long cache, immutable ────────────────────────────────
    # Vite fingerprints these filenames, so they're safe to cache forever
    location ~* \.(js|css|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|webp|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── PDF downloads ─────────────────────────────────────────────────────────
    location ~* \.pdf$ {
        add_header Content-Disposition "attachment";
        try_files $uri =404;
    }

    # ── SPA catch-all — send everything to index.html ─────────────────────────
    # This is what fixes the refresh/direct-link 404 problem inside Docker
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}
